<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — Grand Luxe Hotel</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="register">
    <div class="auth-page">
      <a href="index.html" class="auth-back">← Back to Home</a>

      <div class="auth-card" style="max-width: 520px">
        <div class="auth-card-header">
          <div class="auth-logo">🏨</div>
          <h2>Create Account</h2>
          <p>Join Grand Luxe and enjoy exclusive benefits</p>
        </div>

        <div class="auth-card-body">
          <!-- Benefits strip -->
          <div
            style="
              display: flex;
              gap: 8px;
              margin-bottom: 22px;
              flex-wrap: wrap;
            "
          >
            <span
              style="
                font-size: 0.78rem;
                background: rgba(201, 168, 76, 0.12);
                color: var(--gold-dark);
                padding: 4px 10px;
                border-radius: 20px;
                font-weight: 600;
              "
              >✓ Free Cancellation</span
            >
            <span
              style="
                font-size: 0.78rem;
                background: rgba(201, 168, 76, 0.12);
                color: var(--gold-dark);
                padding: 4px 10px;
                border-radius: 20px;
                font-weight: 600;
              "
              >✓ Member Discounts</span
            >
            <span
              style="
                font-size: 0.78rem;
                background: rgba(201, 168, 76, 0.12);
                color: var(--gold-dark);
                padding: 4px 10px;
                border-radius: 20px;
                font-weight: 600;
              "
              >✓ Priority Booking</span
            >
          </div>

          <form id="registerForm" novalidate>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="regFirstName">First Name</label>
                <input
                  type="text"
                  id="regFirstName"
                  class="form-control"
                  placeholder="John"
                  required
                  autocomplete="given-name"
                />
                <span class="form-error"></span>
              </div>
              <div class="form-group">
                <label class="form-label" for="regLastName">Last Name</label>
                <input
                  type="text"
                  id="regLastName"
                  class="form-control"
                  placeholder="Doe"
                  required
                  autocomplete="family-name"
                />
                <span class="form-error"></span>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="regEmail">Email Address</label>
              <div class="input-group">
                <span class="input-icon">✉️</span>
                <input
                  type="email"
                  id="regEmail"
                  class="form-control"
                  placeholder="john@email.com"
                  required
                  autocomplete="email"
                />
              </div>
              <span class="form-error"></span>
            </div>

            <div class="form-group">
              <label class="form-label" for="regPhone">Phone Number</label>
              <div class="input-group">
                <span class="input-icon">📞</span>
                <input
                  type="tel"
                  id="regPhone"
                  class="form-control"
                  placeholder="+1 (555) 000-0000"
                  required
                  autocomplete="tel"
                />
              </div>
              <span class="form-error"></span>
            </div>

            <div class="form-group">
              <label class="form-label" for="regPassword"
                >Password
                <span style="font-weight: 400; color: var(--text-light)"
                  >(min. 8 characters)</span
                ></label
              >
              <div class="input-group">
                <span class="input-icon">🔒</span>
                <input
                  type="password"
                  id="regPassword"
                  class="form-control"
                  placeholder="Create a strong password"
                  required
                  autocomplete="new-password"
                />
                <span
                  class="toggle-password"
                  id="toggleRegPassword"
                  role="button"
                  title="Toggle visibility"
                  >👁</span
                >
              </div>
              <span class="form-error"></span>
            </div>

            <div class="form-group">
              <label class="form-label" for="regConfirm"
                >Confirm Password</label
              >
              <div class="input-group">
                <span class="input-icon">🔒</span>
                <input
                  type="password"
                  id="regConfirm"
                  class="form-control"
                  placeholder="Repeat your password"
                  required
                  autocomplete="new-password"
                />
              </div>
              <span class="form-error"></span>
            </div>

            <div
              style="
                display: flex;
                align-items: flex-start;
                gap: 8px;
                margin-bottom: 20px;
              "
            >
              <input
                type="checkbox"
                id="agreeTerms"
                style="accent-color: var(--royal-blue); margin-top: 2px"
                required
              />
              <label
                for="agreeTerms"
                style="
                  font-size: 0.85rem;
                  color: var(--text-mid);
                  cursor: pointer;
                  line-height: 1.5;
                "
              >
                I agree to the
                <a href="#" style="color: var(--royal-blue); font-weight: 600"
                  >Terms of Service</a
                >
                and
                <a href="#" style="color: var(--royal-blue); font-weight: 600"
                  >Privacy Policy</a
                >
              </label>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg">
              Create My Account
            </button>
          </form>
        </div>

        <div class="auth-footer">
          Already have an account? <a href="login.html">Sign in</a>
        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
